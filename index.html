<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sledování navštívených zemí</title>

    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* Boční panel */
        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 24px;
            height: fit-content;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .user-card {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-email {
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
        }

        /* Tlačítka */
        button {
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .btn-danger { background: #fee2e2; color: var(--danger); width: 100%; }
        .btn-danger:hover { background: #fca5a5; color: #7f1d1d; }

        /* Statistiky */
        .stats-box {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stats-count {
            font-size: 48px;
            font-weight: 800;
            display: block;
            margin-top: 5px;
        }

        /* Seznam zemí pod sebou */
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #bae6fd;
        }

        /* Hlavní panel s mapou */
        .main-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Kontejner pro AmCharts Mapu */
        #chartdiv {
            width: 100%;
            height: 650px;
            background-color: #f8fafc;
            border-radius: 12px;
            overflow: hidden;
        }

        .map-hint {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="dashboard">
    
    <div class="sidebar">
        <h1>Světoběžník</h1>
        
        <div class="user-card">
            <span id="userStatus" style="color: var(--text-muted)">Načítání...</span>
            <span id="userEmail" class="user-email"></span>
            <button id="loginBtn" class="btn-primary">Přihlásit přes Google</button>
            <button id="logoutBtn" class="btn-danger" style="display:none">Odhlásit se</button>
        </div>

        <div class="stats-box">
            <span>Navštívené země</span>
            <span id="counter" class="stats-count">0</span>
        </div>

        <div>
            <h3 style="margin: 0 0 12px 0; font-size: 16px;">Seznam navštívených států</h3>
            <div id="countries" class="badge-container">
                </div>
        </div>
    </div>

    <div class="main-content">
        <div id="chartdiv"></div>
        <div class="map-hint">💡 Kliknutím na libovolný stát ho přidáš nebo odebereš</div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase konfigurace
const firebaseConfig = {
  apiKey: "AIzaSyBOGBofSuqHCGdmw2wlBP0B4vqqw29BWa4",
  authDomain: "mapp-db0b3.firebaseapp.com",
  projectId: "mapp-db0b3",
  storageBucket: "mapp-db0b3.firebasestorage.app",
  messagingSenderId: "436921956860",
  appId: "1:436921956860:web:91dc40674343443c621a79"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// DOM prvky
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userStatus = document.getElementById("userStatus");
const userEmail = document.getElementById("userEmail");
const countriesDiv = document.getElementById("countries");
const counter = document.getElementById("counter");

let currentUser = null;
let visited = []; // Pole uložených ISO kódů (např. ["CZ", "US", "DE"])

// --- INICIALIZACE MAPY AMCHARTS 5 ---
let root, chart, worldSeries;

function initMap() {
    root = am5.Root.new("chartdiv");
    root.setThemes([am5themes_Animated.new(root)]);

    chart = root.container.children.push(
        am5map.MapChart.new(root, {
            panX: "translateX",
            panY: "translateY",
            projection: am5map.geoMercator() // Použití ploché mapy světa
        })
    );

    worldSeries = chart.series.push(
        am5map.MapPolygonSeries.new(root, {
            geoJSON: am5geodata_worldLow,
            exclude: ["AQ"] // Schováme Antarktidu pro lepší estetiku
        })
    );

    // Základní nastavení vzhledu neoznačených zemí
    worldSeries.mapPolygons.template.setAll({
        tooltipText: "{name}",
        toggleKey: "active",
        interactive: true,
        fill: am5.color(0xcbd5e1), // Světle šedá pro nenavštívené
        stroke: am5.color(0xffffff), // Bílé hranice
        strokeWidth: 1
    });

    // Hover efekt (najetí myší)
    worldSeries.mapPolygons.template.states.create("hover", {
        fill: am5.color(0x94a3b8)
    });

    // Efekt aktivního stavu (Když je země označená jako navštívená)
    worldSeries.mapPolygons.template.states.create("active", {
        fill: am5.color(0x10b981) // Moderní smaragdově zelená
    });

    // HLAVNÍ LOGIKA: Kliknutí na zemi v mapě
    worldSeries.mapPolygons.template.on("active", function(active, target) {
        if (!currentUser) return;
        
        const countryId = target.dataItem.get("id"); // Získá ISO kód státu (např. "CZ")
        
        if (active) {
            if (!visited.includes(countryId)) {
                visited.push(countryId);
                saveData();
            }
        } else {
            visited = visited.filter(id => id !== countryId);
            saveData();
        }
        updateSidebarUI();
    });

    // Přidání ovládacích prvků pro zoomování (plus / mínus tlačítka v rohu)
    chart.set("zoomControl", am5map.ZoomControl.new(root, {}));
}

// Spuštění mapy okamžitě při načtení stránky
initMap();

// --- FIREBASE DATOVÉ FUNKCE ---

async function loadData() {
    const ref = doc(db, "users", currentUser.uid);
    const snap = await getDoc(ref);
    visited = snap.exists() ? (snap.data().countries || []) : [];
    
    // Synchronizace dat z DB do vizuálního stavu mapy
    updateMapVisuals();
    updateSidebarUI();
}

async function saveData() {
    const ref = doc(db, "users", currentUser.uid);
    await setDoc(ref, { countries: visited });
}

// Aktualizace textových prvků a seznamu na levé straně
function updateSidebarUI() {
    countriesDiv.innerHTML = "";
    counter.textContent = visited.length;

    if (visited.length === 0) {
        countriesDiv.innerHTML = `<span style="color: var(--text-muted); font-size: 13px;">Zatím žádné navštívené země.</span>`;
        return;
    }

    visited.forEach(code => {
        // Vyhledáme plný český/anglický název země přímo z mapových geodat podle ISO kódu
        const dataItem = worldSeries.getDataItemById(code);
        const name = dataItem ? dataItem.dataContext.name : code;

        const span = document.createElement("span");
        span.className = "badge";
        span.textContent = name;
        countriesDiv.appendChild(span);
    });
}

// Projde mapu a přepne do stavu 'active' ty státy, které má uživatel uložené v poli 'visited'
function updateMapVisuals() {
    worldSeries.mapPolygons.each(function(polygon) {
        const countryId = polygon.dataItem.get("id");
        if (visited.includes(countryId)) {
            polygon.set("active", true);
        } else {
            polygon.set("active", false);
        }
    });
}

// --- AUTENTIZACE A STAV UŽIVATELE ---

loginBtn.onclick = async () => { 
    try {
        await signInWithPopup(auth, provider); 
    } catch (error) {
        alert("Chyba při přihlašování: " + error.message);
    }
};

logoutBtn.onclick = async () => { await signOut(auth); };

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        userStatus.textContent = "Přihlášen jako:";
        userEmail.textContent = user.email;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        // Aktivujeme interaktivitu mapy (povolená kliknutí)
        worldSeries.mapPolygons.template.set("interactive", true);
        await loadData();
    } else {
        currentUser = null;
        visited = [];
        userStatus.textContent = "Nepřihlášen";
        userEmail.textContent = "";
        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";
        // Pokud není uživatel přihlášen, vymažeme zelené státy a zakážeme klikání
        updateMapVisuals();
        updateSidebarUI();
    }
});
</script>

</body>
</html>
