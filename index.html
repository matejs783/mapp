<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje cestovatelská mapa</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        .auth-panel {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #loginBtn { background-color: #4285F4; color: white; }
        #loginBtn:hover { background-color: #357ae8; }
        #logoutBtn { background-color: #e74c3c; color: white; }
        #logoutBtn:hover { background-color: #c0392b; }
        #addCountryBtn { background-color: #2ecc71; color: white; }
        #addCountryBtn:hover { background-color: #27ae60; }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        /* STYLING MAPY */
        .map-container {
            width: 100%;
            margin: 30px 0;
            background: #eef3f7;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
        }

        svg {
            width: 100%;
            height: auto;
        }

        /* Styly pro jednotlivé země v SVG */
        .land {
            fill: #cccccc;
            fill-rule: evenodd;
            stroke: #ffffff;
            stroke-width: 1;
            stroke-linejoin: round;
            cursor: pointer;
            transition: fill 0.3s;
        }

        .land:hover {
            fill: #999999 !important;
        }

        /* Třída, kterou JavaScript přidá navštívené zemi */
        .land.visited {
            fill: #2ecc71 !important;
        }

        #countries {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .country-badge {
            background: #e8f8f5;
            color: #117a65;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #a3e4d7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Moje navštívené země</h1>

    <div class="auth-panel">
        <div>
            <button id="loginBtn">Přihlásit přes Google</button>
            <button id="logoutBtn" style="display:none">Odhlásit</button>
        </div>
        <p id="user" style="font-weight: bold; margin: 0;">Nepřihlášen</p>
    </div>

    <div class="controls">
        <select id="countrySelect">
            <option value="CZ">Česko</option>
            <option value="SK">Slovensko</option>
            <option value="DE">Německo</option>
            <option value="AT">Rakousko</option>
            <option value="HR">Chorvatsko</option>
            <option value="IT">Itálie</option>
            <option value="ES">Španělsko</option>
            <option value="FR">Francie</option>
            <option value="US">USA</option>
        </select>
        <button id="addCountryBtn">Přidat zemi</button>
    </div>

    <h3>Počet navštívených zemí: <span id="counter">0</span></h3>

    <div class="map-container">
        <svg version="1.1" viewBox="0 0 1008 651" xmlns="http://www.w3.org/2000/svg">
            <path id="US" class="land" d="M196,177 L186,183 L157,184 L142,168 L113,168 L92,185 L59,190 L56,236 L124,271 L131,313 L162,316 L175,299 L241,299 L259,252 L249,193 Z"/>
            <path id="FR" class="land" d="M485,217 L491,208 L503,211 L504,222 L497,233 L486,229 Z"/>
            <path id="ES" class="land" d="M472,234 L484,233 L481,248 L469,248 Z"/>
            <path id="IT" class="land" d="M504,226 L511,225 L518,238 L524,250 L519,253 L511,235 Z"/>
            <path id="DE" class="land" d="M500,195 L512,194 L514,209 L502,210 Z"/>
            <path id="CZ" class="land" d="M513,205 L522,204 L521,210 L513,210 Z"/>
            <path id="AT" class="land" d="M512,212 L523,211 L522,216 L512,215 Z"/>
            <path id="SK" class="land" d="M523,207 L532,207 L530,212 L523,211 Z"/>
            <path id="HR" class="land" d="M518,217 L524,216 L524,221 L519,222 Z"/>
            
            <path class="land" style="pointer-events: none;" d="M51,180 L74,136 L144,115 L269,127 L253,171 L196,172 L150,157 Z" />
            <path class="land" style="pointer-events: none;" d="M255,343 L293,365 L334,424 L306,539 L276,541 L248,435 Z" />
            <path class="land" style="pointer-events: none;" d="M466,321 L525,294 L576,334 L581,372 L528,477 L496,448 L461,364 Z" />
            <path class="land" style="pointer-events: none;" d="M532,184 L644,152 L811,154 L890,198 L785,316 L655,319 L562,254 Z" />
            <path class="land" style="pointer-events: none;" d="M800,451 L874,449 L894,505 L814,510 Z" />
        </svg>
    </div>

    <div id="countries"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOGBofSuqHCGdmw2wlBP0B4vqqw29BWa4",
  authDomain: "mapp-db0b3.firebaseapp.com",
  projectId: "mapp-db0b3",
  storageBucket: "mapp-db0b3.firebasestorage.app",
  messagingSenderId: "436921956860",
  appId: "1:436921956860:web:91dc40674343443c621a79"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userInfo = document.getElementById("user");
const countriesDiv = document.getElementById("countries");
const counter = document.getElementById("counter");
const countrySelect = document.getElementById("countrySelect");

let currentUser = null;
let visited = [];

// Pomocný slovník pro hezčí výpis názvů zemí v textovém seznamu
const countryNames = {
    "CZ": "Česko", "SK": "Slovensko", "DE": "Německo", "AT": "Rakousko",
    "HR": "Chorvatsko", "IT": "Itálie", "ES": "Španělsko", "FR": "Francie", "US": "USA"
};

async function loadData() {
    const ref = doc(db, "users", currentUser.uid);
    const snap = await getDoc(ref);
    visited = snap.exists() ? (snap.data().countries || []) : [];
    render();
}

async function saveData() {
    const ref = doc(db, "users", currentUser.uid);
    await setDoc(ref, { countries: visited });
}

function render() {
    // 1. Vyčištění textového seznamu pod mapou
    countriesDiv.innerHTML = "";
    visited.forEach(code => {
        const span = document.createElement("span");
        span.className = "country-badge";
        span.textContent = countryNames[code] || code;
        countriesDiv.appendChild(span);
    });

    counter.textContent = visited.length;

    // 2. Aktualizace vizuální mapy (SVG)
    // Nejdříve odebereme zelenou barvu všem zemím
    document.querySelectorAll('.land').forEach(el => el.classList.remove('visited'));
    
    // Následně obarvíme ty, které jsou v poli 'visited'
    visited.forEach(code => {
        const countryElement = document.getElementById(code);
        if (countryElement) {
            countryElement.classList.add('visited');
        }
    });
}

// Funkce pro přidání země (volaná tlačítkem i klikem na mapu)
async function handleAddCountry(countryCode) {
    if (!currentUser) {
        alert("Nejdříve se přihlas.");
        return;
    }

    if (!visited.includes(countryCode)) {
        visited.push(countryCode);
        await saveData();
        render();
    }
}

// Událost pro kliknutí na tlačítko "Přidat zemi"
document.getElementById("addCountryBtn").onclick = () => {
    handleAddCountry(countrySelect.value);
};

// Událost pro kliknutí přímo na zemi v SVG mapě
document.querySelectorAll('.land').forEach(countryElement => {
    countryElement.onclick = function() {
        const countryCode = this.id;
        if (countryCode) { // Kontrola, zda má země přidělené ID (kód)
            handleAddCountry(countryCode);
        }
    };
});

loginBtn.onclick = async () => { await signInWithPopup(auth, provider); };
logoutBtn.onclick = async () => { await signOut(auth); };

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        userInfo.textContent = "Přihlášen: " + user.email;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        await loadData();
    } else {
        currentUser = null;
        visited = [];
        userInfo.textContent = "Nepřihlášen";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        render();
    }
});
</script>

</body>
</html>
