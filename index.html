<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Světoběžník PRO - Moje Cestovatelská Mapa</title>

    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --visited: #10b981;
            --wishlist: #f59e0b;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        .dashboard {
            max-width: 1500px;
            margin: 0 auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        @media (max-width: 1024px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        /* Boční panel */
        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
        }

        h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }

        .user-card {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        /* Vyhledávání */
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: inherit;
            box-sizing: border-box;
            font-size: 14px;
        }
        .search-box input:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }
        .search-box i {
            position: absolute;
            right: 15px;
            top: 15px;
            color: var(--text-muted);
        }
        .search-results {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 999;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: none;
        }
        .search-item {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 500;
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: #f1f5f9; color: var(--primary); }

        /* Statistiky a Progress Bar */
        .stats-card {
            background: #ffffff;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
        }
        .progress-container {
            background: #e2e8f0;
            border-radius: 10px;
            height: 10px;
            width: 100%;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar {
            background: var(--visited);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Tlačítka */
        button {
            font-family: inherit; font-size: 14px; font-weight: 600;
            padding: 12px; border-radius: 10px; border: none; cursor: pointer;
            transition: all 0.2s; width: 100%;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: #fee2e2; color: #ef4444; margin-top: 8px;}
        .btn-danger:hover { background: #fca5a5; }

        /* Seznamy zemí */
        .badge-list { display: flex; flex-wrap: wrap; gap: 6px; max-height: 180px; overflow-y: auto; }
        .badge {
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .badge.v { background: #e0f2fe; color: #0369a1; }
        .badge.w { background: #fef3c7; color: #92400e; }

        /* Hlavní panel a mapa */
        .main-content {
            background: var(--bg-card); border-radius: 16px; padding: 20px;
            border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; position: relative;
        }
        #chartdiv { width: 100%; height: 700px; background: #f8fafc; border-radius: 12px; }

        /* Legenda mapy */
        .legend {
            position: absolute; top: 35px; left: 35px;
            background: rgba(255,255,255,0.9); padding: 12px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-size: 12px; display: flex; flex-direction: column; gap: 8px;
            z-index: 5;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }

        /* MODAL (Detail země) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal {
            background: white; padding: 30px; border-radius: 16px; width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 15px;
        }
        .modal h2 { margin: 0; font-size: 22px; }
        .modal select, .modal input, .modal textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; box-sizing: border-box;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }

        /* Režim prohlížení (Sdílení) */
        .view-only-banner {
            background: #f43f5e; color: white; padding: 10px; text-align: center;
            font-weight: bold; font-size: 14px; display: none;
        }
    </style>
</head>
<body>

<div id="shareBanner" class="view-only-banner">
    <i class="fa-solid fa-eye"></i> Prohlížíš sdílenou mapu uživatele. Tvůj přihlášený účet je dočasně neaktivní.
</div>

<div class="dashboard">
    
    <div class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Světoběžník <span style="color:var(--primary)">PRO</span></h1>
            <button id="shareBtn" style="width: auto; padding: 8px 12px; display:none;" class="btn-primary" title="Kopírovat odkaz na mapu"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Hledej zemi (např. Francie)..." autocomplete="off">
            <i class="fa-solid fa-magnifying-glass"></i>
            <div id="searchResults" class="search-results"></div>
        </div>
        
        <div class="user-card">
            <div id="userStatus" style="color: var(--text-muted); font-size: 13px; margin-bottom: 5px;">Načítání...</div>
            <div id="userEmail" style="font-weight: 700; margin-bottom: 10px; word-break: break-all;"></div>
            <button id="loginBtn" class="btn-primary"><i class="fa-solid fa-user"></i> Přihlásit přes Google</button>
            <button id="logoutBtn" class="btn-danger" style="display:none">Odhlásit se</button>
        </div>

        <div class="stats-card">
            <div style="display:flex; justify-content:space-between; font-weight:700;">
                <span>Navštíveno: <span id="vCount" style="color:var(--visited)">0</span></span>
                <span>Chci vidět: <span id="wCount" style="color:var(--wishlist)">0</span></span>
            </div>
            <div style="margin-top: 15px; font-size: 13px; color: var(--text-muted); font-weight: 600;">
                Prozkoumáno: <span id="progressPercent">0</span>% světa
            </div>
            <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
        </div>

        <div>
            <h4 style="margin: 0 0 8px 0;">Navštívené státy</h4>
            <div id="vList" class="badge-list"></div>
            <h4 style="margin: 15px 0 8px 0;">Plánované cesty</h4>
            <div id="wList" class="badge-list"></div>
        </div>
    </div>

    <div class="main-content">
        <div id="chartdiv"></div>
        
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:var(--visited)"></div>Navštíveno</div>
            <div class="legend-item"><div class="dot" style="background:var(--wishlist)"></div>Chci navštívit</div>
            <div class="legend-item"><div class="dot" style="background:#cbd5e1"></div>Nenavštíveno</div>
        </div>
    </div>
</div>

<div id="countryModal" class="modal-overlay">
    <div class="modal">
        <h2 id="modalCountryName">Název země</h2>
        <div>
            <label style="font-size:12px; font-weight:600; color:var(--text-muted)">STAV CESTY</label>
            <select id="modalStatus">
                <option value="none">Nenavštíveno (Smazat)</option>
                <option value="visited">Navštíveno</option>
                <option value="wishlist">Chci navštívit</option>
            </select>
        </div>
        <div>
            <label style="font-size:12px; font-weight:600; color:var(--text-muted)">KDY / PLÁNOVÁNO</label>
            <input type="date" id="modalDate">
        </div>
        <div>
            <label style="font-size:12px; font-weight:600; color:var(--text-muted)">CESTOVATELSKÉ POZNÁMKY</label>
            <textarea id="modalNotes" rows="3" placeholder="Zážitky, památky, restaurace..."></textarea>
        </div>
        <div class="modal-buttons">
            <button id="modalCancelBtn" style="background:#e2e8f0; color:var(--text-main)">Zrušit</button>
            <button id="modalSaveBtn" class="btn-primary">Uložit</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOGBofSuqHCGdmw2wlBP0B4vqqw29BWa4",
  authDomain: "mapp-db0b3.firebaseapp.com",
  projectId: "mapp-db0b3",
  storageBucket: "mapp-db0b3.firebasestorage.app",
  messagingSenderId: "436921956860",
  appId: "1:436921956860:web:91dc40674343443c621a79"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const urlParams = new URLSearchParams(window.location.search);
const sharedUserId = urlParams.get('user');
const isReadOnly = !!sharedUserId;

let currentUser = null;
let dbCountries = {}; 
let selectedCountryId = null;
let root, chart, worldSeries;

// Nezávislá databáze zemí pro bleskové vyhledávání (Čeština + Angličtina)
const countryLookup = [
    { id: "CZ", cs: "Česko", en: "Czechia" }, { id: "SK", cs: "Slovensko", en: "Slovakia" },
    { id: "DE", cs: "Německo", en: "Germany" }, { id: "AT", cs: "Rakousko", en: "Austria" },
    { id: "PL", cs: "Polsko", en: "Poland" }, { id: "FR", cs: "Francie", en: "France" },
    { id: "IT", cs: "Itálie", en: "Italy" }, { id: "ES", cs: "Španělsko", en: "Spain" },
    { id: "GB", cs: "Velká Británie", en: "United Kingdom" }, { id: "US", cs: "USA", en: "United States" },
    { id: "HR", cs: "Chorvatsko", en: "Croatia" }, { id: "GR", cs: "Řecko", en: "Greece" },
    { id: "PT", cs: "Portugalsko", en: "Portugal" }, { id: "EG", cs: "Egypt", en: "Egypt" },
    { id: "TN", cs: "Tunisko", en: "Tunisia" }, { id: "TR", cs: "Turecko", en: "Turkey" },
    { id: "TH", cs: "Thajsko", en: "Thailand" }, { id: "VN", cs: "Vietnam", en: "Vietnam" },
    { id: "JP", cs: "Japonsko", en: "Japan" }, { id: "CN", cs: "Čína", en: "China" },
    { id: "CA", cs: "Kanada", en: "Canada" }, { id: "MX", cs: "Mexiko", en: "Mexico" },
    { id: "BR", cs: "Brazílie", en: "Brazil" }, { id: "AR", cs: "Argentina", en: "Argentina" },
    { id: "AU", cs: "Austrálie", en: "Australia" }, { id: "NZ", cs: "Nový Zéland", en: "New Zealand" },
    { id: "ZA", cs: "Jihoafrická republika", en: "South Africa" }, { id: "CH", cs: "Švýcarsko", en: "Switzerland" },
    { id: "NL", cs: "Nizozemsko", en: "Netherlands" }, { id: "BE", cs: "Belgie", en: "Belgium" },
    { id: "IE", cs: "Irsko", en: "Ireland" }, { id: "SE", cs: "Švédsko", en: "Sweden" },
    { id: "NO", cs: "Norsko", en: "Norway" }, { id: "FI", cs: "Finsko", en: "Finland" },
    { id: "DK", cs: "Dánsko", en: "Denmark" }, { id: "IS", cs: "Island", en: "Iceland" },
    { id: "HU", cs: "Maďarsko", en: "Hungary" }, { id: "RO", cs: "Rumunsko", en: "Romania" },
    { id: "BG", cs: "Bulharsko", en: "Bulgaria" }, { id: "UA", cs: "Ukrajina", en: "Ukraine" },
    { id: "RU", cs: "Rusko", en: "Russia" }, { id: "IN", cs: "Indie", en: "India" },
    { id: "ID", cs: "Indonésie", en: "Indonesia" }, { id: "MY", cs: "Malajsie", en: "Malaysia" },
    { id: "SG", cs: "Singapur", en: "Singapore" }, { id: "AE", cs: "Spojené arabské emiráty", en: "United Arab Emirates" },
    { id: "IL", cs: "Izrael", en: "Israel" }, { id: "MA", cs: "Maroko", en: "Morocco" },
    { id: "CU", cs: "Kuba", en: "Cuba" }, { id: "PE", cs: "Peru", en: "Peru" },
    { id: "CL", cs: "Chile", en: "Chile" }, { id: "CO", cs: "Kolumbie", en: "Colombia" },
    { id: "KE", cs: "Keňa", en: "Kenya" }, { id: "TZ", cs: "Tanzanie", en: "Tanzania" },
    { id: "LK", cs: "Šrí Lanka", en: "Sri Lanka" }, { id: "MV", cs: "Maledivy", en: "Maldives" }
];

// Vrátí nejvhodnější název pro zobrazení
function getCountryName(code) {
    const found = countryLookup.find(c => c.id === code);
    if (found) return found.cs;
    const polygon = worldSeries ? worldSeries.getDataItemById(code) : null;
    return polygon ? polygon.dataContext.name : code;
}

function initMap() {
    root = am5.Root.new("chartdiv");
    root.setThemes([am5themes_Animated.new(root)]);

    chart = root.container.children.push(
        am5map.MapChart.new(root, {
            panX: "translateX", panY: "translateY", projection: am5map.geoMercator()
        })
    );

    worldSeries = chart.series.push(
        am5map.MapPolygonSeries.new(root, {
            geoJSON: am5geodata_worldLow, exclude: ["AQ"]
        })
    );

    worldSeries.mapPolygons.template.setAll({
        tooltipText: "{name}", interactive: true,
        fill: am5.color(0xcbd5e1), stroke: am5.color(0xffffff), strokeWidth: 1
    });

    worldSeries.mapPolygons.template.states.create("hover", { fill: am5.color(0x94a3b8) });

    worldSeries.mapPolygons.template.events.on("click", function(ev) {
        if (isReadOnly) return;
        if (!currentUser) { alert("Pro úpravy se nejdříve přihlas."); return; }
        
        const countryId = ev.target.dataItem.get("id");
        openModal(countryId);
    });

    chart.set("zoomControl", am5map.ZoomControl.new(root, {}));

    worldSeries.events.on("datavalidated", () => {
        if (isReadOnly) {
            loadSharedData();
        } else {
            updateUI();
        }
    });

    // Vyhledávač nastartujeme okamžitě, bez závislosti na vnitřním stavu mapy!
    buildSearch();
}

// Spustit ihned
initMap();

// Modal okno logika
const modal = document.getElementById("countryModal");
function openModal(countryId) {
    selectedCountryId = countryId;
    document.getElementById("modalCountryName").textContent = getCountryName(countryId);
    
    const existingData = dbCountries[countryId] || { status: "none", date: "", notes: "" };
    document.getElementById("modalStatus").value = existingData.status || "none";
    document.getElementById("modalDate").value = existingData.date || "";
    document.getElementById("modalNotes").value = existingData.notes || "";
    
    modal.classList.add("active");
}

document.getElementById("modalCancelBtn").onclick = () => modal.classList.remove("active");
document.getElementById("modalSaveBtn").onclick = async () => {
    const status = document.getElementById("modalStatus").value;
    const date = document.getElementById("modalDate").value;
    const notes = document.getElementById("modalNotes").value;

    if (status === "none") {
        delete dbCountries[selectedCountryId];
    } else {
        dbCountries[selectedCountryId] = { status, date, notes };
    }

    await saveData();
    modal.classList.remove("active");
    updateUI();
};

// --- NOVÝ, NEPRŮSTŘELNÝ NAŠEPTÁVAČ ---
function buildSearch() {
    const searchInput = document.getElementById("searchInput");
    const resultsDiv = document.getElementById("searchResults");

    searchInput.oninput = () => {
        const val = searchInput.value.trim().toLowerCase();
        resultsDiv.innerHTML = "";
        
        if (!val) { 
            resultsDiv.style.display = "none"; 
            return; 
        }

        // Vyhledáváme bleskově v našem lokálním slovníku (v češtině i angličtině)
        const filtered = countryLookup.filter(c => 
            c.cs.toLowerCase().includes(val) || 
            c.en.toLowerCase().includes(val)
        );

        if (filtered.length === 0) {
            resultsDiv.innerHTML = `<div class="search-item" style="color:var(--text-muted); cursor:default;">Země nenalezena</div>`;
            resultsDiv.style.display = "block";
            return;
        }

        filtered.slice(0, 6).forEach(country => {
            const item = document.createElement("div");
            item.className = "search-item";
            item.innerHTML = `<strong>${country.cs}</strong> <span style="color:var(--text-muted); font-size:11px;">(${country.en})</span>`;
            
            item.onclick = () => {
                searchInput.value = "";
                resultsDiv.style.display = "none";

                // Najdeme prvek na mapě podle ID
                const dataItem = worldSeries.getDataItemById(country.id);
                if (dataItem) {
                    chart.zoomToDataItem(dataItem); // Plynulý dolet kamery
                    worldSeries.select(dataItem);
                }
                
                if (!isReadOnly && currentUser) {
                    // Okamžité otevření modalu bez čekání
                    openModal(country.id);
                }
            };
            resultsDiv.appendChild(item);
        });

        resultsDiv.style.display = "block";
    };

    document.addEventListener("click", (e) => {
        if (e.target !== searchInput && e.target !== resultsDiv) {
            resultsDiv.style.display = "none";
        }
    });
}

// --- FIREBASE DATOVÉ FUNKCE ---
async function loadUserData() {
    const ref = doc(db, "users_v2", currentUser.uid);
    const snap = await getDoc(ref);
    dbCountries = snap.exists() ? snap.data() : {};
    updateUI();
}

async function loadSharedData() {
    document.getElementById("shareBanner").style.display = "block";
    const ref = doc(db, "users_v2", sharedUserId);
    const snap = await getDoc(ref);
    dbCountries = snap.exists() ? snap.data() : {};
    updateUI();
}

async function saveData() {
    if (isReadOnly) return;
    const ref = doc(db, "users_v2", currentUser.uid);
    await setDoc(ref, dbCountries);
}

// --- UPDATE UI & MAP VISUALS ---
function updateUI() {
    if (!worldSeries) return;

    const vList = document.getElementById("vList");
    const wList = document.getElementById("wList");
    vList.innerHTML = ""; wList.innerHTML = "";

    let vCount = 0; let wCount = 0;

    // Resetujeme celou mapu do šedé
    worldSeries.mapPolygons.each(polygon => {
        polygon.get("mapPolygon").set("fill", am5.color(0xcbd5e1));
    });

    // Obarvíme uložené země
    Object.keys(dbCountries).forEach(code => {
        const item = dbCountries[code];
        const polygon = worldSeries.getDataItemById(code);
        const name = getCountryName(code);

        if (item.status === "visited") {
            vCount++;
            if(polygon) polygon.get("mapPolygon").set("fill", am5.color(0x10b981)); 
            
            const badge = document.createElement("span");
            badge.className = "badge v";
            badge.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${name}`;
            badge.title = `${item.date ? 'Datum: ' + item.date : ''}\n${item.notes ? 'Poznámka: ' + item.notes : ''}`;
            vList.appendChild(badge);
        } 
        else if (item.status === "wishlist") {
            wCount++;
            if(polygon) polygon.get("mapPolygon").set("fill", am5.color(0xf59e0b)); 
            
            const badge = document.createElement("span");
            badge.className = "badge w";
            badge.innerHTML = `<i class="fa-solid fa-plane"></i> ${name}`;
            badge.title = item.notes ? 'Plán: ' + item.notes : 'Naplánováno';
            wList.appendChild(badge);
        }
    });

    document.getElementById("vCount").textContent = vCount;
    document.getElementById("wCount").textContent = wCount;

    const percent = Math.min(((vCount / 195) * 100).toFixed(1), 100);
    document.getElementById("progressPercent").textContent = percent;
    document.getElementById("progressBar").style.width = percent + "%";
}

document.getElementById("shareBtn").onclick = () => {
    if(!currentUser) return;
    const shareUrl = `${window.location.origin}${window.location.pathname}?user=${currentUser.uid}`;
    navigator.clipboard.writeText(shareUrl);
    alert("Odkaz na tvou mapu byl zkopírován do schránky!");
};

// --- AUTH LOGIKA ---
loginBtn.onclick = async () => { await signInWithPopup(auth, provider); };
logoutBtn.onclick = async () => { window.location.href = window.location.origin + window.location.pathname; await signOut(auth); };

onAuthStateChanged(auth, async (user) => {
    if (isReadOnly) {
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("userStatus").textContent = "Režim prohlížení";
        return;
    }

    if (user) {
        currentUser = user;
        document.getElementById("userStatus").textContent = "Přihlášen jako:";
        document.getElementById("userEmail").textContent = user.email;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        document.getElementById("shareBtn").style.display = "inline-block";
        await loadUserData();
    } else {
        currentUser = null;
        dbCountries = {};
        document.getElementById("userStatus").textContent = "Nepřihlášen";
        document.getElementById("userEmail").textContent = "";
        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";
        document.getElementById("shareBtn").style.display = "none";
        updateUI();
    }
});
</script>

</body>
</html>
